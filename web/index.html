<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>malcolmston/moment — moment.js-style dates and times for Go</title>
<meta name="description" content="A from-scratch, standard-library-only Go take on moment.js over the time package: an immutable Moment wrapping time.Time, moment-token Format and ParseFormat, unit-based Add/StartOf/EndOf arithmetic, Diff, comparisons, timezone reinterpretation and humanized relative time (FromNow, Calendar) with an injectable clock.">

</script>
